name: WordPress CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security scan
        run: |
          echo "Running security checks..."
          find . -name "*.php" -exec grep -l "eval(" {} \; || true
          echo "Security scan complete"

  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Terraform
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Test Docker Compose
        run: |
          cd docker
          docker-compose config

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Health check
        run: |
          ALB_DNS="${{ secrets.ALB_DNS }}"
          response=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB_DNS)
          if [ $response -eq 200 ] || [ $response -eq 301 ]; then
            echo "✅ Site is healthy - HTTP $response"
          else
            echo "❌ Site returned HTTP $response"
            exit 1
          fi

      - name: Trigger rolling update
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name wordpress-ha-asg \
            --region us-east-1
